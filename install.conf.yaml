- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/Screenshots: ~/Pictures/Screenshots
    ~/.zshrc: zsh/zshrc
    ~/.zshenv: zsh/zshenv
    ~/.gitconfig:
    ~/.vimrc:
    ~/.config/starship.toml:
      create: true
    ~/.config/nvim:
      create: true
    ~/.config/bat:
      create: true
    ~/.config/guake:
      create: true
    ~/.config/coc: nvim/coc
      create: true

- create:
    - ~/Code
    - ~/Code/Testbed

- shell:
    - command: ./setup_zsh.zsh
      stdout: true
      stderr: true
    - command: ./setup_ubuntu.zsh
      stdout: true
      stderr: true
