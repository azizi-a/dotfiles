- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/Screenshots: ~/Pictures/Screenshots
    ~/.zshrc: zsh/zshrc
    ~/.zshenv: zsh/zshenv
    ~/.zprofile: zsh/zprofile
    ~/.gitconfig:
    ~/.vimrc:
    ~/.config/starship.toml:
      create: true
    ~/.config/nvim:
      create: true
    ~/.config/bat:
      create: true
    ~/.config/guake:
      create: true
    ~/.config/coc: nvim/coc
    ~/.config/chromium-flags.conf:
      create: true
    ~/.config/VSCodium/User/snippets: vscodium/User/snippets
    ~/.config/VSCodium/User/settings.json: vscodium/User/settings.json

- create:
    - ~/Code
    - ~/Code/Testbed

- shell:
    - command: ./setup_zsh.zsh
      stdout: true
      stderr: true
    - command: ./setup_ubuntu.zsh
      stdout: true
      stderr: true
