- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.zshrc:
    ~/.gitconfig:
    ~/.config/starship.toml:
      create: true
    ~/.config/nvim:
      create: true
    ~/.config/bat:
      create: true

- create:
    - ~/Code

- shell:
    - command: ./setup_homebrew.zsh
      stdout: true
      stderr: true
