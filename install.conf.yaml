- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.zshrc: zsh/zshrc
    ~/.zshenv: zsh/zshenv
    ~/.zsh_history: zsh/zsh_history
    ~/.gitconfig:
    ~/.vimrc:
    ~/.config/starship.toml:
      create: true
    ~/.config/nvim:
      create: true
    ~/.config/bat:
      create: true

- create:
    - ~/Code
    - ~/Code/Testbed
    - ~/Screenshots

- shell:
    - command: ./setup_homebrew.zsh
      stdout: true
      stderr: true
    - command: ./setup_macos.zsh
      stdout: true
      stderr: true
    - command: ./setup_zsh.zsh
      stdout: true
      stderr: true
